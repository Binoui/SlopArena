---
name: Feature Request
description: Suggest an idea for SlopArena
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great! Tell us what you'd like to see in the arena.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: A clear description of what you want to achieve or what pain point this addresses.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've thought about.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, reference games, design documents, etc.
  - type: checkboxes
    id: game_design
    attributes:
      label: Design Fit
      options:
        - label: This aligns with the game's PvP-first, classless, open-source philosophy
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to implement this feature
