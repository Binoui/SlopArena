---
name: Bug Report
description: Report something that's broken or not working as expected
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! The more detail you provide, the faster we can fix it.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open the game
        2. Press X
        3. Move to location Y
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      description: Were you running in sandbox or server mode?
      options:
        - Sandbox (local)
        - Server (multiplayer)
        - Both
    validations:
      required: true
  - type: input
    id: godot_version
    attributes:
      label: Godot Version
      description: e.g., 4.6.1
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Copy any relevant output from the Godot console, or attach screenshots.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR to fix this issue
