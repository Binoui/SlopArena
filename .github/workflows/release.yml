name: Create Release

on:
  push:
    branches: [release]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate next version tag
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$LATEST_TAG"
          IFS='.' read -r -a PARTS <<< "${LATEST_TAG#v}"
          MAJOR=${PARTS[0]:-0}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}
          NEW_TAG="v$MAJOR.$MINOR.$((PATCH + 1))"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

  export-linux:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: true
          include-templates: true
      - name: Build
        run: dotnet build --configuration Release
      - name: Export Linux
        run: |
          mkdir -p dist/linux
          godot --headless --export-release "Linux/X11" dist/linux/SlopArena.x86_64
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlopArena-linux
          path: dist/linux/
          retention-days: 1

  export-windows:
    needs: tag
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: true
          include-templates: true
      - name: Build
        run: dotnet build --configuration Release
      - name: Export Windows
        shell: bash
        run: |
          mkdir -p dist/windows
          # Generate Windows-only export preset (committed file only has Linux)
          printf '%s\n' > export_presets.cfg \
            '[preset.0]' \
            'name="Windows Desktop"' \
            'platform="Windows"' \
            'runnable=false' \
            'dedicated_server=false' \
            'custom_features=""' \
            'export_filter="all_resources"' \
            'include_filter=""' \
            'exclude_filter=""' \
            'export_path=""' \
            'encryption_include_filters=""' \
            'encryption_exclude_filters=""' \
            '[preset.0.options]' \
            'custom_template/debug=""' \
            'custom_template/release=""' \
            'binary_format/embed_pck=true' \
            'binary_format/architecture="x86_64"' \
            'texture_format/s3tc_bptc=true' \
            'texture_format/etc2_astc=false' \
            'dotnet/include_script_source=true'
          echo "=== CFG ==="
          cat export_presets.cfg
          godot --headless --export-release "Windows Desktop" dist/windows/SlopArena.exe 2>&1 || true
          echo "=== dist contents ==="
          ls -la dist/windows/
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlopArena-windows
          path: dist\windows\
          retention-days: 1

  release:
    needs: [tag, export-linux, export-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: SlopArena-linux
          path: dist/linux/
      - uses: actions/download-artifact@v4
        with:
          name: SlopArena-windows
          path: dist/windows/
      - name: Package artifacts
        run: |
          cd dist
          [ -d linux ] && zip -r "../SlopArena-${{ needs.tag.outputs.new_tag }}-linux.zip" linux/
          [ -d windows ] && zip -r "../SlopArena-${{ needs.tag.outputs.new_tag }}-windows.zip" windows/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: ${{ needs.tag.outputs.new_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            SlopArena-${{ needs.tag.outputs.new_tag }}-linux.zip
            SlopArena-${{ needs.tag.outputs.new_tag }}-windows.zip
