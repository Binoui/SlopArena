name: Create Release

on:
  push:
    branches: [release]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: chickensoft-games/setup-godot@v2
        name: Setup Godot (4.6 .NET)
        with:
          version: 4.6.3
          use-dotnet: true
          include-templates: true

      - name: Build C# assemblies
        run: dotnet build --configuration Release

      - name: Generate next version tag
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$LATEST_TAG"
          IFS='.' read -r -a PARTS <<< "${LATEST_TAG#v}"
          MAJOR=${PARTS[0]:-0}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}
          NEW_TAG="v$MAJOR.$MINOR.$((PATCH + 1))"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Export Linux
        run: |
          mkdir -p dist/linux
          godot --headless --export-release "Linux/X11" dist/linux/SlopArena.x86_64

      - name: Export Windows (experimental)
        continue-on-error: true
        run: |
          mkdir -p dist/windows
          printf '%s\n' > export_presets.cfg \
            '[preset.0]' \
            'name="Windows"' \
            'platform="Windows"' \
            'runnable=false' \
            'dedicated_server=false' \
            'custom_features=""' \
            'export_filter="all_resources"' \
            'include_filter=""' \
            'exclude_filter=""' \
            'export_path=""' \
            'encryption_include_filters=""' \
            'encryption_exclude_filters=""' \
            '[preset.0.options]' \
            'custom_template/debug=""' \
            'custom_template/release=""' \
            'binary_format/embed_pck=true' \
            'binary_format/architecture="x86_64"' \
            'texture_format/s3tc_bptc=true' \
            'texture_format/etc2_astc=false' \
            'dotnet/include_script_source=true'
          godot --headless --export-release "Windows" dist/windows/SlopArena.exe 2>&1 || true

      - name: Package artifacts
        run: |
          cd dist
          [ -d linux ] && zip -r "../SlopArena-${{ steps.tag.outputs.new_tag }}-linux.zip" linux/
          [ -s windows/SlopArena.exe ] && zip -r "../SlopArena-${{ steps.tag.outputs.new_tag }}-windows.zip" windows/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            SlopArena-${{ steps.tag.outputs.new_tag }}-linux.zip
