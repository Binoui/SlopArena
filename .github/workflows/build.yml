name: Build & Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Format check
        run: |
          dotnet format SlopArena.sln
          if ! git diff --exit-code; then
            echo "❌ Formatting changes were made. Run 'dotnet format SlopArena.sln' locally and commit."
            exit 1
          fi
          echo "✅ No formatting changes needed"

      - name: Build
        run: dotnet build --no-restore --verbosity minimal

      - name: Code Quality Checks
        run: |
          echo "🔍 Running quality checks..."

          # Check for Godot types in Shared/
          if grep -r "using Godot" Shared/*.cs 2>/dev/null; then
            echo "❌ ERROR: Godot types found in Shared/"
            exit 1
          fi
          echo "✅ Shared/ is pure C#"

          # Count debug logs (warning only, not blocking)
          PRINT_COUNT=$(grep -r "GD\.Print(" Scripts --include="*.cs" | wc -l)
          echo "📊 Debug logs: $PRINT_COUNT statements"
          if [ $PRINT_COUNT -gt 50 ]; then
            echo "⚠️  Warning: High debug log count ($PRINT_COUNT > 50)"
            echo "   Consider using visual debug tools (F3 toggle)"
          fi

          # Check for French comments (warning only)
          FRENCH=$(grep -r "//.*\(je \|tu \|dans \|pour \|très\)" Scripts --include="*.cs" || true)
          if [ -n "$FRENCH" ]; then
            echo "⚠️  Warning: Possible French comments detected"
            echo "   All comments should be in English (open-source project)"
          fi

          echo "✅ Quality checks complete"
